name: BSD

# Runs the test suite (and FreeBSD coverage) inside real BSD VMs via
# https://github.com/vmactions. The cross-compile job in ci.yml only
# verifies that the `bsd_like` / `freebsdlike` / `netbsdlike` cfg paths
# compile — this workflow exercises them at runtime.

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - 'README'
      - 'COPYRIGHT'
      - 'LICENSE-*'
      - '**.md'
      - '**.txt'
  workflow_dispatch:
  schedule:
    - cron: "0 1 1 * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  freebsd:
    name: test (freebsd)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            pkg install -y rust
          run: |
            cargo build --all-features
            cargo test --all-features -- --nocapture

  dragonflybsd:
    name: test (dragonflybsd)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Test on DragonFlyBSD
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            pkg install -y rust
          run: |
            cargo build --all-features
            cargo test --all-features -- --nocapture

  openbsd:
    name: test (openbsd)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Test on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            pkg_add -I rust
          run: |
            cargo build --all-features
            cargo test --all-features -- --nocapture

  netbsd:
    name: test (netbsd)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Test on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: false
          prepare: |
            /usr/sbin/pkg_add rust
          run: |
            cargo build --all-features
            cargo test --all-features -- --nocapture

  # Coverage runs on FreeBSD (`freebsdlike` + `bsd_like` paths) and NetBSD
  # (`netbsdlike` path). FreeBSD uses rustup with `llvm-tools-preview`;
  # NetBSD uses pkgsrc rust + the bundled llvm-cov from rustlib (matches
  # rustc's LLVM version). Skipped on PRs because installing
  # cargo-llvm-cov from source inside each VM adds ~10 minutes — runs on
  # push/dispatch/schedule instead. Best-effort: VM step is
  # continue-on-error and uploads are gated on the report existing.
  freebsd-coverage:
    name: coverage (freebsd)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile=minimal --default-toolchain stable -c llvm-tools-preview
            . $HOME/.cargo/env
            cargo install cargo-llvm-cov --locked
          run: |
            . $HOME/.cargo/env
            mkdir -p coverage/freebsd
            cargo llvm-cov --all-features --cobertura --output-path coverage/freebsd/cobertura.xml -- --nocapture
        continue-on-error: true
      - name: Upload coverage artifact
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: coverage/freebsd/cobertura.xml
      - name: Upload coverage to Codecov
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage/freebsd/cobertura.xml
          flags: freebsd
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  netbsd-coverage:
    name: coverage (netbsd)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            /usr/sbin/pkg_add rust
            export PATH=$HOME/.cargo/bin:$PATH
            cargo install cargo-llvm-cov --locked
          run: |
            export PATH=$HOME/.cargo/bin:$PATH
            # Prefer the llvm-cov / llvm-profdata that ship with pkgsrc's rust
            # (under /usr/pkg/lib/rustlib/<target>/bin) so the LLVM major
            # version matches rustc. Falls through to PATH discovery if the
            # rustlib copy isn't present.
            RUST_BIN=$(find /usr/pkg/lib/rustlib -type d -name bin 2>/dev/null | head -1)
            if [ -x "$RUST_BIN/llvm-cov" ] && [ -x "$RUST_BIN/llvm-profdata" ]; then
              export LLVM_COV="$RUST_BIN/llvm-cov"
              export LLVM_PROFDATA="$RUST_BIN/llvm-profdata"
            fi
            mkdir -p coverage/netbsd
            cargo llvm-cov --all-features --cobertura --output-path coverage/netbsd/cobertura.xml -- --nocapture
        continue-on-error: true
      - name: Upload coverage artifact
        if: hashFiles('coverage/netbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: netbsd
          path: coverage/netbsd/cobertura.xml
      - name: Upload coverage to Codecov
        if: hashFiles('coverage/netbsd/cobertura.xml') != ''
        uses: codecov/codecov-action@v6
        with:
          files: coverage/netbsd/cobertura.xml
          flags: netbsd
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
