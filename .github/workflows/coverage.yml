name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage-report:
    name: Generate Coverage for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run Coverage and Generate Report
        run: |
          mkdir -p coverage
          cargo tarpaulin --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/${{ matrix.os }} -j 1

      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: coverage/${{ matrix.os }}/cobertura.xml

  # BSD coverage runs in vmactions VMs. FreeBSD uses cargo-tarpaulin
  # (same as Linux/macOS/Windows above, installed inside the VM via
  # rustup so we always get a recent toolchain). NetBSD, OpenBSD, and
  # DragonFly use cargo-llvm-cov instead — their pkg-shipped rust
  # versions (1.85.1 on DragonFly, 1.90.0 on OpenBSD, similar on
  # NetBSD) lag behind tarpaulin's transitive-dep MSRV requirements
  # (cargo-platform 0.3.3 needs 1.91, cargo_metadata 0.23 needs 1.86,
  # etc.), so installing tarpaulin from crates.io fails MSRV no
  # matter which 0.3x.x release we pin to. cargo-llvm-cov has a much
  # smaller dep tree and stays compatible with older rustc; it also
  # plays well with the rustlib-shipped `llvm-cov` / `llvm-profdata`
  # binaries so the LLVM major version always matches rustc's.
  #
  # All four BSDs in the matching `ci.yml` `test-*` jobs (FreeBSD,
  # NetBSD, OpenBSD, DragonFly) have a coverage counterpart here.
  # All jobs are best-effort: the VM step is `continue-on-error` and
  # the artifact upload is gated on the report existing.
  coverage-freebsd:
    name: Generate Coverage for freebsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            cargo install cargo-tarpaulin --locked
          run: |
            . $HOME/.cargo/env
            mkdir -p coverage/freebsd
            cargo tarpaulin --all-features --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/freebsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: coverage/freebsd/cobertura.xml

  coverage-netbsd:
    name: Generate Coverage for netbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            /usr/sbin/pkg_add rust
            export PATH=$HOME/.cargo/bin:$PATH
            # `cargo-llvm-cov` instead of `cargo-tarpaulin` here:
            # tarpaulin's recent transitive deps (`cargo-platform`,
            # `cargo_metadata`, `gimli`, `icu_*`) declare rust-version
            # constraints above what NetBSD's pkgsrc rust currently
            # provides, so installing tarpaulin from crates.io fails
            # MSRV regardless of which 0.3x.x release we pin to.
            # `cargo-llvm-cov` has a much smaller dep tree and stays
            # compatible with older rustc.
            cargo install cargo-llvm-cov --locked
          run: |
            export PATH=$HOME/.cargo/bin:$PATH
            # Prefer the `llvm-cov` / `llvm-profdata` shipped under
            # `/usr/pkg/lib/rustlib/<target>/bin` (pkgsrc rust's
            # rustlib copy) so the LLVM major version matches
            # rustc's. Falls through to PATH discovery if the
            # rustlib copy isn't present.
            RUST_BIN=$(find /usr/pkg/lib/rustlib -type d -name bin 2>/dev/null | head -1)
            if [ -x "$RUST_BIN/llvm-cov" ] && [ -x "$RUST_BIN/llvm-profdata" ]; then
              export LLVM_COV="$RUST_BIN/llvm-cov"
              export LLVM_PROFDATA="$RUST_BIN/llvm-profdata"
            fi
            mkdir -p coverage/netbsd
            # Lib-only on NetBSD for the same reason as `test-netbsd`
            # in `ci.yml`: doctests + the `tests/` integration suite
            # hit a `parse_addrs` "invalid address" gap on the VM's
            # `RTM_NEWADDR` slot encoding.
            cargo llvm-cov --all-features --lib --cobertura --output-path coverage/netbsd/cobertura.xml -- --nocapture

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/netbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: netbsd
          path: coverage/netbsd/cobertura.xml

  coverage-openbsd:
    name: Generate Coverage for openbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg_add -I rust
            # `cargo-llvm-cov` instead of `cargo-tarpaulin`: tarpaulin
            # 0.34+ transitively pulls in `cargo-platform 0.3.3`
            # (rustc 1.91) which exceeds OpenBSD's pkg-shipped rust
            # (currently 1.90). cargo-llvm-cov has a much smaller dep
            # tree and stays compatible.
            cargo install cargo-llvm-cov --locked
          run: |
            # Prefer the `llvm-cov` / `llvm-profdata` shipped under
            # OpenBSD's rustlib bin directory so the LLVM major
            # version matches rustc's. Falls through to PATH
            # discovery if the rustlib copy isn't present.
            RUST_BIN=$(find /usr/local/lib/rustlib -type d -name bin 2>/dev/null | head -1)
            if [ -x "$RUST_BIN/llvm-cov" ] && [ -x "$RUST_BIN/llvm-profdata" ]; then
              export LLVM_COV="$RUST_BIN/llvm-cov"
              export LLVM_PROFDATA="$RUST_BIN/llvm-profdata"
            fi
            mkdir -p coverage/openbsd
            cargo llvm-cov --all-features --cobertura --output-path coverage/openbsd/cobertura.xml -- --nocapture

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/openbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: openbsd
          path: coverage/openbsd/cobertura.xml

  coverage-dragonflybsd:
    name: Generate Coverage for dragonflybsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on DragonFlyBSD
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y rust
            # `cargo-llvm-cov` instead of `cargo-tarpaulin`: tarpaulin
            # 0.32+ transitively pulls in `cargo_metadata 0.20+` /
            # `gimli 0.32+` whose own deps require ≥ 1.86, and DragonFly's
            # pkg-shipped rust is currently 1.85.1. cargo-llvm-cov has a
            # much smaller dep tree and stays compatible with older rustc.
            cargo install cargo-llvm-cov --locked
          run: |
            # DragonFly's pkg-shipped Rust is 1.85.x — same MSRV
            # workaround as `test-dragonflybsd` in `ci.yml`: pin
            # smol_str + criterion back to versions whose declared
            # MSRV matches, in this CI run only via
            # `cargo update --precise`.
            cargo generate-lockfile
            cargo update -p smol_str --precise 0.3.2
            cargo update -p criterion --precise 0.7.0
            # Prefer the `llvm-cov` / `llvm-profdata` shipped under
            # DragonFly's rustlib bin directory so the LLVM major
            # version matches rustc's.
            RUST_BIN=$(find /usr/local/lib/rustlib -type d -name bin 2>/dev/null | head -1)
            if [ -x "$RUST_BIN/llvm-cov" ] && [ -x "$RUST_BIN/llvm-profdata" ]; then
              export LLVM_COV="$RUST_BIN/llvm-cov"
              export LLVM_PROFDATA="$RUST_BIN/llvm-profdata"
            fi
            mkdir -p coverage/dragonflybsd
            # Lib-only on DragonFly for the same reason as
            # `test-dragonflybsd` in `ci.yml`: the vmactions VM has a
            # sparse network configuration that breaks the
            # `tests/interfaces.rs` assertions, and the
            # `interface_by_index` re-lookup in `ifis` flakes due to
            # interface churn.
            cargo llvm-cov --all-features --lib --cobertura --output-path coverage/dragonflybsd/cobertura.xml -- --nocapture

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/dragonflybsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: dragonflybsd
          path: coverage/dragonflybsd/cobertura.xml

  upload-codecov:
    # `needs:` waits on every coverage producer. The
    # `if: always() && !cancelled()` predicate opts the upload step
    # into running even if a producer fails or is skipped — without
    # it, GitHub Actions would short-circuit the whole upload on any
    # missing dependency, and a single VM hiccup on FreeBSD/NetBSD
    # would silently kill the entire coverage signal. The
    # `download-artifact@v6` step picks up whatever artifacts were
    # actually produced; a missing BSD report just means the
    # codecov.io merge runs without that platform's data for that
    # commit.
    needs: [coverage-report, coverage-freebsd, coverage-netbsd, coverage-openbsd, coverage-dragonflybsd]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all coverage reports
        uses: actions/download-artifact@v6
        with:
          path: reports/
      - name: List contents of the reports directory
        run: ls -a reports || true
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          directory: reports
          fail_ci_if_error: false
          slug: ${{ github.repository }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
