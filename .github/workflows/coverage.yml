name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage-report:
    name: Generate Coverage for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run Coverage and Generate Report
        run: |
          mkdir -p coverage
          cargo tarpaulin --all-features --engine llvm --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/${{ matrix.os }} -j 1
      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: coverage/${{ matrix.os }}/cobertura.xml

  # BSD coverage runs in vmactions VMs using cargo-tarpaulin (same
  # tool as the Linux/macOS/Windows job above, installed inside each
  # VM). FreeBSD uses rustup so we get a recent toolchain;
  # NetBSD/OpenBSD/DragonFly use their pkg-shipped rust, which on
  # OpenBSD (1.90) and DragonFly (1.85.1) is below tarpaulin's recent
  # transitive-dep MSRV â€” those jobs pin to older tarpaulin releases
  # whose dep tree still compiles on the older toolchain.
  #
  # All BSDs skip doctests: tarpaulin's doctest-build path triggers a
  # rustup component download on FreeBSD that flaked, and the
  # `tests/` integration coverage already exercises every public API
  # surface from a real call site. Lib + integration tests are the
  # right scope for these VMs.
  #
  # Earlier revisions tried cargo-llvm-cov on the older-Rust BSDs to
  # sidestep the tarpaulin MSRV issue, but llvm-cov needs
  # `llvm-tools-preview` shipped via rustup or a rustlib bin
  # directory â€” neither of which the BSD pkg-installed Rusts
  # provide â€” so it fails with "failed to find llvm-tools-preview".
  # Pinned-version tarpaulin is the working answer.
  #
  # All four BSDs in the matching `ci.yml` `test-*` jobs (FreeBSD,
  # NetBSD, OpenBSD, DragonFly) have a coverage counterpart here.
  # All jobs are best-effort: the VM step is `continue-on-error` and
  # the artifact upload is gated on the report existing.
  coverage-freebsd:
    name: Generate Coverage for freebsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            cargo install cargo-tarpaulin --locked
          run: |
            . $HOME/.cargo/env
            mkdir -p coverage/freebsd
            # Doctests skipped on BSDs â€” tarpaulin's doctest build
            # path triggers a rustup component download that has
            # flaked here. Tests + Lib give the same coverage of
            # every public API call surface.
            cargo tarpaulin --all-features --run-types Tests --run-types Lib --out xml --output-dir coverage/freebsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: coverage/freebsd/cobertura.xml

  coverage-netbsd:
    name: Generate Coverage for netbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            /usr/sbin/pkg_add rust
            export PATH=$HOME/.cargo/bin:$PATH
            # Pin to 0.31.5 â€” last cargo-tarpaulin release whose dep
            # tree compiles on rust < 1.86. NetBSD's pkgsrc rust
            # lags behind that floor, and 0.32+ pulls in
            # `cargo_metadata 0.20+` / `gimli 0.32+` / `icu_*`
            # transitive deps requiring 1.86+; 0.35+ additionally
            # needs `cargo-platform 0.3.3` (1.91). `--no-default-features`
            # skips the openssl-pulling `coveralls` reporter (NetBSD
            # pkgsrc lacks matching openssl headers). No `--locked`
            # so cargo resolves transitive deps fresh.
            cargo install cargo-tarpaulin --version "=0.31.5" --no-default-features
          run: |
            export PATH=$HOME/.cargo/bin:$PATH
            mkdir -p coverage/netbsd
            # Lib-only on NetBSD for the same reason as `test-netbsd`
            # in `ci.yml`: the `tests/` integration suite hits a
            # `parse_addrs` "invalid address" gap on the VM's
            # `RTM_NEWADDR` slot encoding.
            cargo tarpaulin --all-features --run-types Lib --out xml --output-dir coverage/netbsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/netbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: netbsd
          path: coverage/netbsd/cobertura.xml

  coverage-openbsd:
    name: Generate Coverage for openbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg_add -I rust
            # OpenBSD's pkg-shipped Rust is currently 1.90.0.
            # cargo-tarpaulin 0.34+ pulls in `cargo-platform 0.3.3`
            # (rustc 1.91) which exceeds 1.90, so anything â‰Ą 0.34
            # fails MSRV. Pin to 0.33.0 (October 2025) â€” its dep
            # tree predates the `cargo-platform 1.91` bump.
            # `--no-default-features` skips the openssl-pulling
            # `coveralls` reporter. No `--locked` so cargo resolves
            # transitive deps fresh against the installed
            # toolchain.
            # Bump this pin once OpenBSD's pkg catches up to 1.91.
            cargo install cargo-tarpaulin --version "=0.33.0" --no-default-features
          run: |
            mkdir -p coverage/openbsd
            cargo tarpaulin --all-features --run-types Tests --run-types Lib --out xml --output-dir coverage/openbsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/openbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: openbsd
          path: coverage/openbsd/cobertura.xml

  coverage-dragonflybsd:
    name: Generate Coverage for dragonflybsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on DragonFlyBSD
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y rust
            # DragonFly's pkg-shipped Rust is currently 1.85.1.
            # Pin to 0.31.5 â€” last cargo-tarpaulin release whose dep
            # tree compiles on rust < 1.86. 0.32+ pulls in
            # `cargo_metadata 0.20+` / `gimli 0.32+` requiring 1.86+;
            # 0.35+ additionally needs `cargo-platform 0.3.3` (1.91).
            # `--no-default-features` skips the openssl-pulling
            # `coveralls` reporter. No `--locked` so cargo resolves
            # transitive deps fresh.
            # Bump this pin once DragonFly's pkg catches up to 1.86+.
            cargo install cargo-tarpaulin --version "=0.31.5" --no-default-features
          run: |
            # DragonFly's pkg-shipped Rust is 1.85.x â€” same MSRV
            # workaround as `test-dragonflybsd` in `ci.yml`: pin
            # smol_str + criterion back to versions whose declared
            # MSRV matches, in this CI run only via
            # `cargo update --precise`.
            cargo generate-lockfile
            cargo update -p smol_str --precise 0.3.2
            cargo update -p criterion --precise 0.7.0
            mkdir -p coverage/dragonflybsd
            # Lib-only on DragonFly for the same reason as
            # `test-dragonflybsd` in `ci.yml`: the vmactions VM has a
            # sparse network configuration that breaks the
            # `tests/interfaces.rs` assertions, and the
            # `interface_by_index` re-lookup in `ifis` flakes due to
            # interface churn.
            cargo tarpaulin --all-features --run-types Lib --out xml --output-dir coverage/dragonflybsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/dragonflybsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: dragonflybsd
          path: coverage/dragonflybsd/cobertura.xml

  upload-codecov:
    # `needs:` waits on every coverage producer. The
    # `if: always() && !cancelled()` predicate opts the upload step
    # into running even if a producer fails or is skipped â€” without
    # it, GitHub Actions would short-circuit the whole upload on any
    # missing dependency, and a single VM hiccup on FreeBSD/NetBSD
    # would silently kill the entire coverage signal. The
    # `download-artifact@v6` step picks up whatever artifacts were
    # actually produced; a missing BSD report just means the
    # codecov.io merge runs without that platform's data for that
    # commit.
    needs: [coverage-report, coverage-freebsd, coverage-netbsd, coverage-openbsd, coverage-dragonflybsd]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all coverage reports
        uses: actions/download-artifact@v8
        with:
          path: reports/
      - name: List contents of the reports directory
        run: ls -a reports || true
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          directory: reports
          fail_ci_if_error: false
          slug: ${{ github.repository }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
