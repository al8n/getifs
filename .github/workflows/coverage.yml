name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage-report:
    name: Generate Coverage for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run Coverage and Generate Report
        run: |
          mkdir -p coverage
          cargo tarpaulin --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/${{ matrix.os }} -j 1

      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: coverage/${{ matrix.os }}/cobertura.xml

  # BSD coverage runs in vmactions VMs using cargo-tarpaulin — same
  # tool as the Linux/macOS/Windows job above, just installed inside
  # each VM. Tarpaulin's LLVM-instrumentation engine handles the
  # non-Linux targets, so we no longer need the cargo-llvm-cov /
  # rustlib-llvm-cov plumbing the previous revision required. All four
  # BSDs in the matching `ci.yml` `test-*` jobs (FreeBSD, NetBSD,
  # OpenBSD, DragonFly) have a coverage counterpart here.
  #
  # All jobs are best-effort: the VM step is `continue-on-error` and
  # the artifact upload is gated on the report existing. OpenBSD and
  # DragonFly are most likely to fall back to "no artifact" — neither
  # is in tarpaulin's officially-supported matrix, so the
  # `cargo install cargo-tarpaulin` build can fail outright; when it
  # works, the LLVM-instrumentation engine handles the coverage
  # collection the same way it does on FreeBSD/NetBSD.
  coverage-freebsd:
    name: Generate Coverage for freebsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            cargo install cargo-tarpaulin --locked
          run: |
            . $HOME/.cargo/env
            mkdir -p coverage/freebsd
            cargo tarpaulin --all-features --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/freebsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: coverage/freebsd/cobertura.xml

  coverage-netbsd:
    name: Generate Coverage for netbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            /usr/sbin/pkg_add rust
            export PATH=$HOME/.cargo/bin:$PATH
            # `--no-default-features` drops the `coveralls` feature
            # which transitively pulls in `reqwest` → `openssl-sys`.
            # NetBSD's pkgsrc doesn't ship matching openssl headers,
            # so the openssl-sys build script fails. We only need
            # the core coverage instrumentation, not the
            # coveralls.io reporter.
            cargo install cargo-tarpaulin --locked --no-default-features
          run: |
            export PATH=$HOME/.cargo/bin:$PATH
            mkdir -p coverage/netbsd
            # Lib-only on NetBSD for the same reason as `test-netbsd` in
            # `ci.yml`: doctests + the `tests/` integration suite hit a
            # `parse_addrs` "invalid address" gap on the VM's
            # `RTM_NEWADDR` slot encoding. Lib coverage alone is
            # enough to exercise the netbsdlike code path.
            cargo tarpaulin --all-features --run-types Lib --out xml --output-dir coverage/netbsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/netbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: netbsd
          path: coverage/netbsd/cobertura.xml

  coverage-openbsd:
    name: Generate Coverage for openbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg_add -I rust
            # OpenBSD's pkg-shipped Rust is currently 1.90.0. Latest
            # cargo-tarpaulin (0.35.x) pulls in `cargo-platform 0.3.3`
            # which declares `rust-version = 1.91`, so the install
            # fails MSRV. Pin to the 0.34.x line — its dep tree pre-
            # dates the cargo-platform 1.91 bump and works on 1.90.
            # Bump this pin once OpenBSD's pkg catches up.
            # `--no-default-features` mirrors the NetBSD job to
            # sidestep the openssl-sys build (we don't need
            # coveralls).
            cargo install cargo-tarpaulin --version "~0.34" --locked --no-default-features
          run: |
            mkdir -p coverage/openbsd
            cargo tarpaulin --all-features --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/openbsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/openbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: openbsd
          path: coverage/openbsd/cobertura.xml

  coverage-dragonflybsd:
    name: Generate Coverage for dragonflybsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on DragonFlyBSD
        uses: vmactions/dragonflybsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y rust
            # DragonFly's pkg-shipped Rust is currently 1.85.1.
            # Latest cargo-tarpaulin (0.35.x) needs ≥ 1.91 via
            # `cargo-platform 0.3.3`; even the 0.34.x line transitively
            # pulls in deps requiring 1.86+. The 0.32.x line is the
            # last release with a dep tree compatible with 1.85.
            # `--no-default-features` skips the openssl-pulling
            # `coveralls` feature (same rationale as NetBSD/OpenBSD).
            # Bump this pin once DragonFly's pkg catches up.
            cargo install cargo-tarpaulin --version "~0.32" --locked --no-default-features
          run: |
            # DragonFly's pkg-shipped Rust is 1.85.x — same MSRV
            # workaround as `test-dragonflybsd` in `ci.yml`: pin
            # smol_str + criterion back to versions whose declared
            # MSRV matches, in this CI run only via
            # `cargo update --precise`.
            cargo generate-lockfile
            cargo update -p smol_str --precise 0.3.2
            cargo update -p criterion --precise 0.7.0
            mkdir -p coverage/dragonflybsd
            # Lib-only on DragonFly for the same reason as
            # `test-dragonflybsd` in `ci.yml`: the vmactions VM has a
            # sparse network configuration that breaks the
            # `tests/interfaces.rs` assertions, and the
            # `interface_by_index` re-lookup in `ifis` flakes due to
            # interface churn.
            cargo tarpaulin --all-features --run-types Lib --out xml --output-dir coverage/dragonflybsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/dragonflybsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: dragonflybsd
          path: coverage/dragonflybsd/cobertura.xml

  upload-codecov:
    # `needs:` waits on every coverage producer. The
    # `if: always() && !cancelled()` predicate opts the upload step
    # into running even if a producer fails or is skipped — without
    # it, GitHub Actions would short-circuit the whole upload on any
    # missing dependency, and a single VM hiccup on FreeBSD/NetBSD
    # would silently kill the entire coverage signal. The
    # `download-artifact@v6` step picks up whatever artifacts were
    # actually produced; a missing BSD report just means the
    # codecov.io merge runs without that platform's data for that
    # commit.
    needs: [coverage-report, coverage-freebsd, coverage-netbsd, coverage-openbsd, coverage-dragonflybsd]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all coverage reports
        uses: actions/download-artifact@v6
        with:
          path: reports/
      - name: List contents of the reports directory
        run: ls -a reports || true
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          directory: reports
          fail_ci_if_error: false
          slug: ${{ github.repository }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
