name: coverage

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'COPYRIGHT'
      - 'LICENSE*'
      - '**.md'
      - '**.txt'
      - 'art'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage-report:
    name: Generate Coverage for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run Coverage and Generate Report
        run: |
          mkdir -p coverage
          cargo tarpaulin --all-features --engine llvm --run-types Doctests --run-types Tests --run-types Lib --out xml --output-dir coverage/${{ matrix.os }} -j 1
      - name: Upload Coverage Report as Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: coverage/${{ matrix.os }}/cobertura.xml

  # BSD coverage runs in vmactions VMs using cargo-tarpaulin. Only
  # FreeBSD and OpenBSD have viable coverage jobs — NetBSD's pkgsrc
  # rust and DragonFly's pkg rust are both built without the
  # `profiler_builtins` crate, so any `-Cinstrument-coverage` build
  # fails with `error[E0463]: can't find crate for profiler_builtins`.
  # rustup doesn't support either of those triples, so we can't swap
  # in a profiler-enabled toolchain inside the vmactions VM. The
  # `test-netbsd` and `test-dragonflybsd` jobs in `ci.yml` exercise
  # those code paths at runtime; coverage just isn't measurable.
  #
  # FreeBSD uses rustup so we get a recent toolchain that matches
  # tarpaulin latest. OpenBSD pins to tarpaulin 0.31.5 with
  # `--no-default-features` — that's the unique version that satisfies
  # both constraints we hit on OpenBSD's pkg-shipped rust (1.90.0):
  #   1. cargo_metadata = "0.19" predates the cargo-platform 0.3.3
  #      MSRV cliff at rust 1.91 (anything 0.32+ pulls it in).
  #   2. coveralls-api became optional behind the `coveralls` feature
  #      in 0.31.5, so --no-default-features cuts the
  #      reqwest → openssl-sys path — important because openssl-sys
  #      0.9.x doesn't support OpenBSD's LibreSSL 4.0+.
  #
  # All BSDs skip doctests: tarpaulin's doctest-build path triggers
  # a rustup component download that has flaked, and Tests + Lib
  # cover every public API call surface anyway.
  #
  # Earlier revisions tried cargo-llvm-cov on the older-Rust BSDs to
  # sidestep the tarpaulin MSRV issue, but llvm-cov also needs
  # rustlib-shipped `llvm-cov` / `llvm-profdata` (which pkg rusts
  # don't include), and on older Rust llvm-cov hits its own MSRV.
  # Pinned-version tarpaulin where the rust supports
  # `profiler_builtins` is the working answer.
  #
  # Both jobs are best-effort: the VM step is `continue-on-error`
  # and the artifact upload is gated on the report existing.
  coverage-freebsd:
    name: Generate Coverage for freebsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg install -y curl
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile=minimal --default-toolchain stable
            . $HOME/.cargo/env
            cargo install cargo-tarpaulin --locked
          run: |
            . $HOME/.cargo/env
            mkdir -p coverage/freebsd
            # Doctests skipped on BSDs — tarpaulin's doctest build
            # path triggers a rustup component download that has
            # flaked here. Tests + Lib give the same coverage of
            # every public API call surface.
            cargo tarpaulin --all-features --run-types Tests --run-types Lib --out xml --output-dir coverage/freebsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/freebsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: freebsd
          path: coverage/freebsd/cobertura.xml

  # NetBSD coverage isn't viable: the pkgsrc-shipped `rust` package is
  # built without `profiler_builtins`, which `-Cinstrument-coverage`
  # requires. tarpaulin's coverage compile fails with
  # `error[E0463]: can't find crate for profiler_builtins / the
  # compiler may have been built without the profiler runtime`.
  # rustup doesn't support NetBSD as a host triple, so there's no way
  # to swap in a profiler-enabled toolchain inside the vmactions VM.
  # The runtime test pass in `ci.yml`'s `test-netbsd` job exercises
  # the netbsdlike code path; coverage just isn't measurable here.

  coverage-openbsd:
    name: Generate Coverage for openbsd
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - name: Generate coverage on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          copyback: true
          prepare: |
            pkg_add -I rust
            # OpenBSD's pkg-shipped Rust is currently 1.90.0.
            # Pin to 0.31.5 — it's the right intersection of two
            # constraints:
            #   1. `cargo_metadata = "0.19"` in its Cargo.toml,
            #      which depends on `cargo-platform 0.1.x` (pre-MSRV
            #      cliff). 0.32+ uses `cargo_metadata 0.20+` whose
            #      transitive `cargo-platform 0.3.3` declares
            #      `rust-version = 1.91` and fails on rust 1.90.
            #   2. `coveralls-api` first became optional behind the
            #      `coveralls` feature in 0.31.5. 0.30.0 (and
            #      earlier) hard-required it, so
            #      `--no-default-features` couldn't drop the
            #      transitive `reqwest → native-tls → openssl-sys`
            #      chain. openssl-sys 0.9.102 only supports LibreSSL
            #      ≤ 3.9.x and OpenBSD ships LibreSSL 4.0+, so
            #      the build aborts.
            # 0.31.5 with `--no-default-features` cuts the entire
            # coveralls/reqwest/openssl-sys path, sidestepping the
            # LibreSSL version mismatch. `--locked` keeps the
            # bundled lockfile to also avoid surprise transitive
            # bumps.
            # Bump this pin once OpenBSD's pkg catches up to 1.91.
            cargo install cargo-tarpaulin --version "=0.31.5" --no-default-features --locked
          run: |
            mkdir -p coverage/openbsd
            cargo tarpaulin --all-features --run-types Tests --run-types Lib --out xml --output-dir coverage/openbsd -j 1

      - name: Upload Coverage Report as Artifact
        if: hashFiles('coverage/openbsd/cobertura.xml') != ''
        uses: actions/upload-artifact@v7
        with:
          name: openbsd
          path: coverage/openbsd/cobertura.xml

  # DragonFly coverage isn't viable for the same reason as NetBSD:
  # the pkg-shipped `rust` package is built without
  # `profiler_builtins`, so `-Cinstrument-coverage` fails with
  # `error[E0463]: can't find crate for profiler_builtins`. rustup
  # doesn't support DragonFly as a host triple. The runtime test
  # pass in `ci.yml`'s `test-dragonflybsd` job exercises the
  # freebsdlike-with-DragonFly-quirks code path.

  upload-codecov:
    # `needs:` waits on every coverage producer. The
    # `if: always() && !cancelled()` predicate opts the upload step
    # into running even if a producer fails or is skipped — without
    # it, GitHub Actions would short-circuit the whole upload on any
    # missing dependency, and a single VM hiccup on FreeBSD/NetBSD
    # would silently kill the entire coverage signal. The
    # `download-artifact@v6` step picks up whatever artifacts were
    # actually produced; a missing BSD report just means the
    # codecov.io merge runs without that platform's data for that
    # commit.
    needs: [coverage-report, coverage-freebsd, coverage-openbsd]
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download all coverage reports
        uses: actions/download-artifact@v8
        with:
          path: reports/
      - name: List contents of the reports directory
        run: ls -a reports || true
      - name: Upload to codecov.io
        uses: codecov/codecov-action@v6
        with:
          directory: reports
          fail_ci_if_error: false
          slug: ${{ github.repository }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
